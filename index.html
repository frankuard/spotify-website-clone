<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li class="logo"> <img src="pictures/logo.png" alt="Spotify" srcset=""> Spotify</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="container">

        <h1> Best of The Smiths</h1>
        <div class="song-list"> </div>
        <div class="song-banner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="ProgressBar" min="0" max="100">
        <div class="icons">
            <!-- font awesome icons -->
             <i class="fa-solid fa-backward-step"></i>
             <i class="fa-regular fa-circle-play"></i>
             <i class="fa-solid fa-forward-step"></i>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/f12d3d7f07.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
